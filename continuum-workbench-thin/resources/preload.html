<style>
  /* Prevent white flash — set background on html/body before any other CSS loads */
  html, body {
    background-color: #292D3E !important;
    margin: 0;
    padding: 0;
  }
  .theia-preload {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: #292D3E !important;
    background: #292D3E !important;
    color: #C4A8FF;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .theia-preload::after {
    content: none !important;
    animation: none !important;
  }
  .continuum-splash-logo {
    width: 100px;
    margin-bottom: 24px;
    filter: drop-shadow(0 4px 12px rgba(196, 168, 255, 0.3));
  }
  .continuum-splash-text {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .continuum-splash-subtitle {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 2px;
    opacity: 0.6;
    margin-bottom: 32px;
  }
  .continuum-splash-spinner {
    width: 32px;
    height: 32px;
    border: 2px solid #454a5e;
    border-top: 2px solid #C4A8FF;
    border-radius: 50%;
    animation: continuum-spin 0.8s linear infinite;
  }
  @keyframes continuum-spin {
    to { transform: rotate(360deg); }
  }
</style>
<img class="continuum-splash-logo" src="./Logo.png" alt="Continuum" />
<div class="continuum-splash-text">Continuum</div>
<div class="continuum-splash-subtitle">Workflow Development IDE</div>
<div class="continuum-splash-spinner"></div>
