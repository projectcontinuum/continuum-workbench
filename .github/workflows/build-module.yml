name: Build Module

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish as a release build (immutable version, no SNAPSHOT suffix)'
        required: true
        type: boolean
        default: false

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon
        env:
          IS_RELEASE_BUILD: ${{ inputs.release }}

      - name: Push container image to Docker Hub
        run: ./gradlew jib --no-daemon
        env:
          IS_RELEASE_BUILD: ${{ inputs.release }}
          DOCKER_REPO_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_REPO_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
